    </linearGradient>

    <linearGradient id="wingLeft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="50%" stop-color="#F472B6"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>

    <linearGradient id="wingRight" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="50%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>

    <linearGradient id="bodyTop" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#C4B5FD"/>
      <stop offset="50%" stop-color="#F472B6"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>

    <linearGradient id="bodyLeft" x1="0%" y1="0%" x2="100%" y2="100%">
