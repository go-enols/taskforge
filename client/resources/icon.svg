  <rect width="1024" height="1024" rx="200" fill="url(#bg)"/>

  <g opacity="0.85">
    <circle cx="150" cy="200" r="2" fill="#FFFFFF" opacity="0.6"/>
    <circle cx="850" cy="180" r="1.5" fill="#FFFFFF" opacity="0.5"/>
    <circle cx="200" cy="380" r="1" fill="#FFFFFF" opacity="0.4"/>
    <circle cx="900" cy="400" r="1.5" fill="#FFFFFF" opacity="0.4"/>
    <circle cx="120" cy="540" r="1" fill="#FFFFFF" opacity="0.3"/>
    <circle cx="780" cy="320" r="1" fill="#FFFFFF" opacity="0.3"/>
    <circle cx="880" cy="600" r="1.2" fill="#FFFFFF" opacity="0.35"/>
